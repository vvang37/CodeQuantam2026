    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
    }

    .container {
      background: rgba(0, 0, 0, 0.35);
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 650px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    select,
    button {
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      margin: 10px 5px;
    }

    select {
      width: 220px;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    #songResult {
      margin-top: 25px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      min-height: 120px;
    }

    .song-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .song-artist {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .song-description {
      font-size: 15px;
      opacity: 0.9;
    }
  </style>

    function generateRandomSong() {
      const selectedMood = document.getElementById("moodSelect").value;
      const resultBox = document.getElementById("songResult");

      if (!selectedMood) {
        resultBox.innerHTML = "<p>Please select a mood first.</p>";
        return;
      }

      const moodData = songsByMood[selectedMood];
      const songs = moodData.songs;
      const randomIndex = Math.floor(Math.random() * songs.length);
      const randomSong = songs[randomIndex];

      resultBox.innerHTML = `
        <div class="song-title">${moodData.emoji} ${randomSong.title}</div>
        <div class="song-artist">by ${randomSong.artist}</div>
        <div class="song-description">${moodData.description}</div>
      `;
    }
  </script>
